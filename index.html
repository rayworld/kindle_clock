<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Time</title>
<style>
  /* 最基础的样式，防止白底白字 */
  body {
    background-color: #ffffff;
    color: #000000;
    margin: 0;
    padding: 0;
    text-align: center;
    /* 强制使用系统默认字体，不加载任何网络字体 */
    font-family: sans-serif; 
  }
  #clock {
    /* 使用绝对定位确保居中，兼容老式浏览器 */
    position: absolute;
    top: 50%;
    left: 50%;
    /* 如果 transform 不支持，至少会显示在左上角，不会消失 */
    -webkit-transform: translate(-50%, -50%);
    transform: translate(-50%, -50%);
    
    font-size: 150px; /* 默认大小 */
    font-weight: bold;
    line-height: 1;
  }
</style>
</head>
<body>

<!-- 即使 JS 不运行，这里也会显示 "00:00"，绝不会白屏 -->
<div id="clock">00:00</div>

<script>
function update() {
  var now = new Date();
  var h = now.getHours();
  var m = now.getMinutes();
  if (h < 10) h = "0" + h;
  if (m < 10) m = "0" + m;
  var t = h + ":" + m;
  
  var el = document.getElementById("clock");
  if (el) {
    el.innerHTML = t;
    
    // 简单的字体大小调整逻辑，适配屏幕
    var w = window.innerWidth || document.body.clientWidth;
    var size = w * 0.8; 
    if (size > 300) size = 300; // 最大限制
    el.style.fontSize = size + "px";
  }
}

// 页面加载完成后立即执行
update();
// 每分钟更新
setInterval(update, 60000);
</script>

</body>
</html>
