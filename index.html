<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Kindle Clock</title>
<style>
  body {
    background-color: #ffffff;
    color: #000000;
    margin: 0;
    padding: 0;
    text-align: center; /* 全局居中 */
    font-family: sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
  }
  
  #container {
    position: absolute;
    top: 50%;
    left: 50%;
    -webkit-transform: translate(-50%, -50%);
    transform: translate(-50%, -50%);
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center; /* 关键：Flex 项目水平居中 */
    justify-content: center;
    gap: 20px;
  }

  /* 日期样式 - 强化居中 */
  #date {
    font-weight: bold;
    line-height: 1.2;
    white-space: nowrap;
    text-align: center; /* 强制文本内容居中 */
    margin: 0 auto; /* 自动左右边距，确保块级元素居中 */
    display: block; /* 确保 margin auto 生效 */
    width: 100%; /* 占满容器宽度以便内部文本居中 */
    font-size: 80px; 
  }

  /* 时间样式 */
  #clock {
    font-weight: 900;
    line-height: 1;
    white-space: nowrap;
    text-align: center;
    display: block;
    width: 100%;
    font-size: 150px;
  }

  /* 时区指示器样式 */
  #timezone-indicator {
    font-size: 18px;
    color: #666666;
    margin-top: 15px;
    font-weight: normal;
    text-align: center;
  }
  
  /* 点击闪动效果 */
  .flash-active {
    opacity: 0.4;
    transition: opacity 0.1s;
  }
</style>
</head>
<body>

<div id="container">
  <div id="date">YYYY-MM-DD</div>
  <div id="clock">00:00</div>
  <div id="timezone-indicator">UTC+0 (点击屏幕 +1 小时)</div>
</div>

<script>
var STORAGE_KEY = 'kindle_clock_offset';
var offset = 0;

function init() {
  var saved = localStorage.getItem(STORAGE_KEY);
  if (saved !== null) {
    offset = parseInt(saved, 10);
  }
  updateDisplay();
  setInterval(tick, 1000);
}

function getAdjustedDate() {
  var now = new Date();
  var utc = now.getTime() + (now.getTimezoneOffset() * 60000);
  return new Date(utc + (3600000 * offset));
}

function updateDisplay() {
  var dateObj = getAdjustedDate();
  
  var y = dateObj.getFullYear();
  var m = dateObj.getMonth() + 1;
  var d = dateObj.getDate();
  if (m < 10) m = "0" + m;
  if (d < 10) d = "0" + d;
  var dateStr = y + "-" + m + "-" + d;
  
  var h = dateObj.getHours();
  var min = dateObj.getMinutes();
  if (h < 10) h = "0" + h;
  if (min < 10) min = "0" + min;
  var timeStr = h + ":" + min;
  
  var tzStr = "UTC" + (offset >= 0 ? "+" : "") + offset;
  
  var dateEl = document.getElementById("date");
  var clockEl = document.getElementById("clock");
  var tzEl = document.getElementById("timezone-indicator");
  
  if (dateEl.innerHTML !== dateStr) dateEl.innerHTML = dateStr;
  if (clockEl.innerHTML !== timeStr) clockEl.innerHTML = timeStr;
  if (tzEl.innerHTML.indexOf(tzStr) === -1) tzEl.innerHTML = tzStr + " (点击屏幕 +1 小时)";
  
  adjustFontSizes();
}

var lastMinute = -1;
function tick() {
  var dateObj = getAdjustedDate();
  if (dateObj.getMinutes() !== lastMinute) {
    lastMinute = dateObj.getMinutes();
    updateDisplay();
  }
}

function adjustFontSizes() {
  var w = window.innerWidth || document.body.clientWidth;
  var h = window.innerHeight || document.body.clientHeight;
  
  // 计算时间字体
  var clockSize = Math.floor(w * 0.95);
  if (clockSize > h * 0.45) clockSize = Math.floor(h * 0.45);
  if (clockSize < 40) clockSize = 40;
  if (clockSize > 300) clockSize = 300;
  document.getElementById("clock").style.fontSize = clockSize + "px";
  
  // 计算日期字体
  var dateSize = Math.floor(w * 0.85);
  if (dateSize > h * 0.15) dateSize = Math.floor(h * 0.15);
  if (dateSize < 20) dateSize = 20;
  if (dateSize > 150) dateSize = 150;
  document.getElementById("date").style.fontSize = dateSize + "px";
}

function handleTap() {
  offset += 1;
  localStorage.setItem(STORAGE_KEY, offset.toString());
  updateDisplay();
  
  var container = document.getElementById("container");
  container.classList.add("flash-active");
  setTimeout(function() {
    container.classList.remove("flash-active");
  }, 150);
}

document.body.addEventListener('click', handleTap);
document.body.addEventListener('touchstart', function(e) {
  handleTap();
}, false);

window.onresize = adjustFontSizes;

init();
</script>

</body>
</html>
