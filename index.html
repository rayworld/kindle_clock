<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Kindle Clock</title>
<style>
  body {
    background-color: #ffffff;
    color: #000000;
    margin: 0;
    padding: 0;
    text-align: center;
    font-family: sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
  }
  
  #container {
    position: absolute;
    top: 50%;
    left: 50%;
    -webkit-transform: translate(-50%, -50%);
    transform: translate(-50%, -50%);
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    /* 减小间距，给大字腾出空间 */
    gap: 10px; 
  }

  #date {
    font-weight: bold;
    line-height: 1.1;
    white-space: nowrap;
    /* 初始值，JS 会覆盖 */
    font-size: 100px; 
  }

  #clock {
    font-weight: 900;
    line-height: 1;
    white-space: nowrap;
    font-size: 150px;
  }

  #timezone-indicator {
    font-size: 18px;
    color: #666666;
    margin-top: 10px;
    font-weight: normal;
  }
  
  .flash-active {
    opacity: 0.4;
    transition: opacity 0.1s;
  }
</style>
</head>
<body>

<div id="container">
  <div id="date">YYYY-MM-DD</div>
  <div id="clock">00:00</div>
  <div id="timezone-indicator">UTC+0 (点击屏幕 +1 小时)</div>
</div>

<script>
var STORAGE_KEY = 'kindle_clock_offset';
var offset = 0;

function init() {
  var saved = localStorage.getItem(STORAGE_KEY);
  if (saved !== null) {
    offset = parseInt(saved, 10);
  }
  updateDisplay();
  setInterval(tick, 1000);
}

function getAdjustedDate() {
  var now = new Date();
  var utc = now.getTime() + (now.getTimezoneOffset() * 60000);
  return new Date(utc + (3600000 * offset));
}

function updateDisplay() {
  var dateObj = getAdjustedDate();
  
  // 日期 yyyy-MM-dd
  var y = dateObj.getFullYear();
  var m = dateObj.getMonth() + 1;
  var d = dateObj.getDate();
  if (m < 10) m = "0" + m;
  if (d < 10) d = "0" + d;
  var dateStr = y + "-" + m + "-" + d;
  
  // 时间 HH:mm
  var h = dateObj.getHours();
  var min = dateObj.getMinutes();
  if (h < 10) h = "0" + h;
  if (min < 10) min = "0" + min;
  var timeStr = h + ":" + min;
  
  var tzStr = "UTC" + (offset >= 0 ? "+" : "") + offset;
  
  var dateEl = document.getElementById("date");
  var clockEl = document.getElementById("clock");
  var tzEl = document.getElementById("timezone-indicator");
  
  if (dateEl.innerHTML !== dateStr) dateEl.innerHTML = dateStr;
  if (clockEl.innerHTML !== timeStr) clockEl.innerHTML = timeStr;
  if (tzEl.innerHTML.indexOf(tzStr) === -1) tzEl.innerHTML = tzStr + " (点击屏幕 +1 小时)";
  
  adjustFontSizes();
}

var lastMinute = -1;
function tick() {
  var dateObj = getAdjustedDate();
  if (dateObj.getMinutes() !== lastMinute) {
    lastMinute = dateObj.getMinutes();
    updateDisplay();
  }
}

function adjustFontSizes() {
  var w = window.innerWidth || document.body.clientWidth;
  var h = window.innerHeight || document.body.clientHeight;
  
  // --- 核心修改：日期和时间都基于宽度计算，最大化利用屏幕 ---
  
  // 1. 计算时间字体 (宽度的 95%)
  var clockSize = Math.floor(w * 0.95);
  // 安全检查：如果高度实在不够，稍微缩小一点，但优先级低于宽度
  if (clockSize * 1.2 > h * 0.55) {
     clockSize = Math.floor((h * 0.55) / 1.2);
  }
  document.getElementById("clock").style.fontSize = clockSize + "px";
  
  // 2. 计算日期字体 (宽度的 90%，尽量大)
  // 不再严格限制高度比例，允许它占据剩余空间，只要不溢出
  var dateSize = Math.floor(w * 0.90);
  
  // 简单的高度防溢出检查：确保 日期高度 + 时间高度 < 屏幕高度
  // 估算高度：字体大小 * 1.1 (行高)
  var estimatedTotalHeight = (dateSize * 1.1) + (clockSize * 1.1) + 20; // 20 是间距
  
  if (estimatedTotalHeight > h) {
      // 如果超出了，按比例缩小日期，优先保证时间大小
      var availableForDate = h - (clockSize * 1.1) - 20;
      dateSize = Math.floor(availableForDate / 1.1);
  }
  
  // 最小字号限制
  if (dateSize < 30) dateSize = 30;
  
  document.getElementById("date").style.fontSize = dateSize + "px";
}

function handleTap() {
  offset += 1;
  localStorage.setItem(STORAGE_KEY, offset.toString());
  updateDisplay();
  
  var container = document.getElementById("container");
  container.classList.add("flash-active");
  setTimeout(function() {
    container.classList.remove("flash-active");
  }, 150);
}

document.body.addEventListener('click', handleTap);
document.body.addEventListener('touchstart', function(e) {
  handleTap();
}, false);

window.onresize = adjustFontSizes;

init();
</script>

</body>
</html>
