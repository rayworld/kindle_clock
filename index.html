<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Kindle Clock</title>
<style>
  body {
    background-color: #FFFFFF;
    color: #000000;
    margin: 0;
    padding: 0;
    text-align: center;
    font-family: sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
  }

  #container {
    position: absolute;
    top: 50%;
    left: 50%;
    -webkit-transform: translate(-50%, -50%);
    transform: translate(-50%, -50%);
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  #analog-clock {
    position: relative;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background-color: #FFFFFF;
    border: 8px solid #000000;
    box-sizing: border-box;
    margin: 0 auto;
  }

  .center-dot {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 12px;
    height: 12px;
    background-color: #000000;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    z-index: 30;
  }

  .hour-mark {
    position: absolute;
    top: 0;
    left: 50%;
    width: 4px;
    height: 15px;
    background-color: #000000;
    transform-origin: 50% 150px;
    transform: translateX(-50%) rotate(0deg);
    z-index: 1;
  }

  /* 指针样式 - 移除所有 transition，确保瞬间跳变 */
  .hand {
    position: absolute;
    bottom: 50%;
    left: 50%;
    background-color: #000000;
    transform-origin: bottom center;
    z-index: 20;
    border-top-left-radius: 2px;
    border-top-right-radius: 2px;
  }

  #hour-hand {
    width: 8px;
    height: 25%;
    /* 预设一个角度，防止初始 0 度卡死 */
    transform: translateX(-50%) rotate(0deg); 
  }

  #minute-hand {
    width: 6px;
    height: 38%;
    transform: translateX(-50%) rotate(0deg);
  }

  #digital-clock {
    font-weight: 900;
    font-size: 50px;
    line-height: 1;
    white-space: nowrap;
  }

  #date {
    font-weight: bold;
    font-size: 28px;
    white-space: nowrap;
  }

  #timezone-indicator {
    font-size: 14px;
    color: #555555;
  }

  .flash-active {
    opacity: 0.5;
  }
</style>
</head>
<body>

<div id="container">
  <div id="analog-clock">
    <div class="center-dot"></div>
    <div id="hour-hand" class="hand"></div>
    <div id="minute-hand" class="hand"></div>
    <!-- 刻度由 JS 生成 -->
  </div>
  
  <div id="digital-clock">--:--</div>
  <div id="date">---- -- --</div>
  <div id="timezone-indicator">UTC+0 (点击屏幕 +1 小时)</div>
</div>

<script>
var STORAGE_KEY = 'kindle_clock_offset';
var offset = 0;
var analogClockEl = document.getElementById('analog-clock');
var hourHand = document.getElementById('hour-hand');
var minuteHand = document.getElementById('minute-hand');
var lastMin = -1;

function init() {
  var saved = localStorage.getItem(STORAGE_KEY);
  if (saved !== null) {
    offset = parseInt(saved, 10);
  }
  
  // 1. 生成刻度
  createMarkers();
  
  // 2. 连续三次强制刷新，确保 Kindle 渲染引擎被唤醒
  forceRefresh();
  setTimeout(forceRefresh, 300);
  setTimeout(forceRefresh, 800);
  
  // 3. 启动定时器
  scheduleNextTick();
}

function scheduleNextTick() {
  setTimeout(function() {
    checkAndUpdate();
    scheduleNextTick();
  }, 1000);
}

function checkAndUpdate() {
  var dateObj = getCalculatedDate(offset);
  var currentMin = dateObj.getMinutes();
  
  if (currentMin !== lastMin) {
    lastMin = currentMin;
    forceRefresh();
  }
}

function getCalculatedDate(currentOffset) {
  var now = new Date();
  var utc = now.getTime() + (now.getTimezoneOffset() * 60000);
  return new Date(utc + (currentOffset * 3600000));
}

function forceRefresh() {
  // 每次刷新都重新获取尺寸，防止 Kindle 布局未就绪
  var radius = analogClockEl.offsetWidth / 2;
  if (radius === 0) radius = 150; // 默认值
  
  // 重新计算刻度位置（防止初始位置错误）
  var marks = document.querySelectorAll('.hour-mark');
  for(var i=0; i<marks.length; i++) {
    marks[i].style.transformOrigin = '50% ' + radius + 'px';
  }

  var dateObj = getCalculatedDate(offset);
  var h = dateObj.getHours();
  var m = dateObj.getMinutes();
  
  // 更新下方文字
  var hStr = (h < 10 ? '0' : '') + h;
  var mStr = (m < 10 ? '0' : '') + m;
  document.getElementById('digital-clock').innerHTML = hStr + ':' + mStr;
  
  var y = dateObj.getFullYear();
  var mo = dateObj.getMonth() + 1;
  var d = dateObj.getDate();
  var moStr = (mo < 10 ? '0' : '') + mo;
  var dStr = (d < 10 ? '0' : '') + d;
  document.getElementById('date').innerHTML = y + '-' + moStr + '-' + dStr;
  
  var tzStr = 'UTC' + (offset >= 0 ? '+' : '') + offset;
  document.getElementById('timezone-indicator').innerHTML = tzStr + ' (点击屏幕 +1 小时)';
  
  // 更新指针
  updateHands(h, m);
}

function updateHands(h, m) {
  h = h % 12;
  var mAngle = m * 6;
  var hAngle = (h * 30) + (m * 0.5);
  
  // 直接赋值，不加任何多余空格或单位错误
  var hStyle = 'translateX(-50%) rotate(' + hAngle + 'deg)';
  var mStyle = 'translateX(-50%) rotate(' + mAngle + 'deg)';
  
  hourHand.style.transform = hStyle;
  minuteHand.style.transform = mStyle;
  
  // 【核心黑科技】强制触发重绘
  // 通过微调 opacity 欺骗浏览器认为元素发生了变化，从而重新绘制
  analogClockEl.style.opacity = '0.98';
  setTimeout(function() {
    analogClockEl.style.opacity = '1';
  }, 50);
}

function createMarkers() {
  // 清空旧刻度
  var existing = analogClockEl.querySelectorAll('.hour-mark');
  for(var i=0; i<existing.length; i++) existing[i].remove();
  
  var radius = analogClockEl.offsetWidth / 2;
  if (radius === 0) radius = 150;

  for (var i = 0; i < 12; i++) {
    var mark = document.createElement('div');
    mark.className = 'hour-mark';
    mark.style.transformOrigin = '50% ' + radius + 'px';
    mark.style.transform = 'translateX(-50%) rotate(' + (i * 30) + 'deg)';
    analogClockEl.appendChild(mark);
  }
}

function handleTap() {
  offset += 1;
  localStorage.setItem(STORAGE_KEY, offset.toString());
  lastMin = -1; // 强制下次检查必定刷新
  
  // 点击后立即强制刷新
  forceRefresh();
  
  // 闪动反馈
  var container = document.getElementById('container');
  container.className = 'flash-active';
  setTimeout(function(){ container.className = ''; }, 150);
}

document.body.addEventListener('click', handleTap);
document.body.addEventListener('touchstart', function(e){ 
  e.preventDefault(); // 防止双击缩放
  handleTap(); 
}, false);

// 启动
init();
</script>

</body>
</html>
