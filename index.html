<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Kindle Clock</title>
<style>
  body {
    background-color: #FFFFFF;
    color: #000000;
    margin: 0;
    padding: 0;
    text-align: center;
    font-family: sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
  }

  #container {
    position: absolute;
    top: 50%;
    left: 50%;
    -webkit-transform: translate(-50%, -50%);
    transform: translate(-50%, -50%);
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 15px;
  }

  #analog-clock {
    position: relative;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background-color: #FFFFFF;
    border: 8px solid #000000;
    box-sizing: border-box;
    margin: 0 auto;
  }

  .center-dot {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 14px;
    height: 14px;
    background-color: #000000;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    z-index: 30;
  }

  .hour-mark {
    position: absolute;
    top: 0;
    left: 50%;
    width: 6px;
    height: 20px;
    background-color: #000000;
    transform-origin: 50% 150px;
    transform: translateX(-50%) rotate(0deg);
    z-index: 1;
  }

  .clock-number {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-weight: 900;
    color: #000000;
    -webkit-font-smoothing: none; 
    text-rendering: optimizeSpeed;
    z-index: 2;
  }

  .hour-number { font-size: 24px; }
  .minute-number { font-size: 14px; color: #333333; font-weight: bold; }

  .hand {
    position: absolute;
    bottom: 50%;
    left: 50%;
    background-color: #000000;
    transform-origin: bottom center;
    /* 关键：移除 transition，让指针瞬间跳动，避免 Kindle 渲染队列堵塞 */
    z-index: 20;
    border-top-left-radius: 4px;
    border-top-right-radius: 4px;
  }

  #hour-hand { width: 10px; height: 25%; }
  #minute-hand { width: 7px; height: 38%; }

  #digital-clock {
    font-weight: 900;
    font-size: 60px;
    line-height: 1;
    white-space: nowrap;
    margin-top: 5px;
  }

  #date {
    font-weight: bold;
    font-size: 30px;
    white-space: nowrap;
    margin-top: 5px;
  }

  #timezone-indicator {
    font-size: 16px;
    color: #555555;
    margin-top: 5px;
  }

  .flash-active { opacity: 0.5; }
</style>
</head>
<body>

<div id="container">
  <div id="analog-clock">
    <div class="center-dot"></div>
    <div id="hour-hand" class="hand"></div>
    <div id="minute-hand" class="hand"></div>
  </div>
  <div id="digital-clock">--:--</div>
  <div id="date">---- -- --</div>
  <div id="timezone-indicator">UTC+0 (点击屏幕 +1 小时)</div>
</div>

<script>
var STORAGE_KEY = 'kindle_clock_offset';
var offset = 0;
var analogClockEl = document.getElementById('analog-clock');
var hourHand = document.getElementById('hour-hand');
var minuteHand = document.getElementById('minute-hand');
var lastMin = -1;

// 初始化
function init() {
  var saved = localStorage.getItem(STORAGE_KEY);
  if (saved !== null) {
    offset = parseInt(saved, 10);
  }
  
  // 1. 生成刻度和数字
  createMarkersAndNumbers();
  
  // 2. 立即执行一次刷新
  refreshDisplay();
  
  // 3. 【关键】使用 setTimeout 递归调用，替代 setInterval，兼容性更好
  scheduleNextTick();
}

// 调度下一次检查
function scheduleNextTick() {
  setTimeout(function() {
    checkAndUpdate();
    scheduleNextTick(); // 递归调用
  }, 1000); // 每秒检查一次
}

// 检查并更新
function checkAndUpdate() {
  var dateObj = getCalculatedDate(offset);
  var currentMin = dateObj.getMinutes();
  
  // 如果分钟变了，或者这是第一次运行 (lastMin === -1)
  if (currentMin !== lastMin) {
    lastMin = currentMin;
    refreshDisplay();
  }
}

function getCalculatedDate(currentOffset) {
  var now = new Date(); // 每次获取最新时间
  var utc = now.getTime() + (now.getTimezoneOffset() * 60000);
  return new Date(utc + (currentOffset * 3600000));
}

function refreshDisplay() {
  var dateObj = getCalculatedDate(offset);
  var h = dateObj.getHours();
  var m = dateObj.getMinutes();
  
  // 更新数字时间
  var hStr = (h < 10 ? '0' : '') + h;
  var mStr = (m < 10 ? '0' : '') + m;
  document.getElementById('digital-clock').innerHTML = hStr + ':' + mStr;
  
  // 更新日期
  var y = dateObj.getFullYear();
  var mo = dateObj.getMonth() + 1;
  var d = dateObj.getDate();
  var moStr = (mo < 10 ? '0' : '') + mo;
  var dStr = (d < 10 ? '0' : '') + d;
  document.getElementById('date').innerHTML = y + '-' + moStr + '-' + dStr;
  
  // 更新时区文字
  var tzStr = 'UTC' + (offset >= 0 ? '+' : '') + offset;
  document.getElementById('timezone-indicator').innerHTML = tzStr + ' (点击屏幕 +1 小时)';
  
  // 【核心】强制更新指针
  updateHands(h, m);
}

function updateHands(h, m) {
  // 转换为 12 小时制
  h = h % 12;
  
  // 计算角度
  var mAngle = m * 6;
  var hAngle = (h * 30) + (m * 0.5);
  
  // 直接操作 style，不使用 CSS 变量或复杂逻辑
  // 注意：Kindle 可能需要明确的单位
  var hStyle = 'translateX(-50%) rotate(' + hAngle + 'deg)';
  var mStyle = 'translateX(-50%) rotate(' + mAngle + 'deg)';
  
  hourHand.style.transform = hStyle;
  minuteHand.style.transform = mStyle;
  
  // 调试：如果是 Kindle，有时候需要强制重绘父容器来触发子元素更新
  // 这里通过微调 opacity 来强制触发重绘（肉眼不可见）
  analogClockEl.style.opacity = '0.99';
  setTimeout(function(){ analogClockEl.style.opacity = '1'; }, 50);
}

function createMarkersAndNumbers() {
  // 防止重复添加
  var existing = analogClockEl.querySelectorAll('.hour-mark, .clock-number');
  for(var i=0; i<existing.length; i++) existing[i].remove();

  var radius = analogClockEl.offsetWidth / 2;
  
  // 刻度
  for (var i = 0; i < 12; i++) {
    var mark = document.createElement('div');
    mark.className = 'hour-mark';
    mark.style.transformOrigin = '50% ' + radius + 'px';
    mark.style.transform = 'translateX(-50%) rotate(' + (i * 30) + 'deg)';
    analogClockEl.appendChild(mark);
  }

  // 小时数字
  var hRad = radius * 0.65;
  for (var h = 1; h <= 12; h++) {
    var el = document.createElement('div');
    el.className = 'clock-number hour-number';
    el.innerHTML = h;
    var rad = (h * 30 - 90) * (Math.PI / 180);
    el.style.transform = 'translate(-50%, -50%) translate(' + (Math.cos(rad)*hRad) + 'px, ' + (Math.sin(rad)*hRad) + 'px)';
    analogClockEl.appendChild(el);
  }

  // 分钟数字
  var mRad = radius * 0.45;
  for (var m = 0; m < 60; m += 5) {
    var el = document.createElement('div');
    el.className = 'clock-number minute-number';
    el.innerHTML = (m < 10 ? '0' : '') + m;
    var rad = (m * 6 - 90) * (Math.PI / 180);
    el.style.transform = 'translate(-50%, -50%) translate(' + (Math.cos(rad)*mRad) + 'px, ' + (Math.sin(rad)*mRad) + 'px)';
    analogClockEl.appendChild(el);
  }
}

function handleTap() {
  offset += 1;
  localStorage.setItem(STORAGE_KEY, offset.toString());
  
  // 重置 lastMin 强制立即刷新
  lastMin = -1;
  refreshDisplay();
  
  // 闪动反馈
  var container = document.getElementById('container');
  container.className = 'flash-active';
  setTimeout(function(){ container.className = ''; }, 150);
}

document.body.addEventListener('click', handleTap);
document.body.addEventListener('touchstart', function(e){ handleTap(); }, false);

// 启动
init();
</script>

</body>
</html>
