<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Kindle Clock</title>
<style>
  body {
    background-color: #ffffff;
    color: #000000;
    margin: 0;
    padding: 0;
    text-align: center;
    font-family: sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
  }
  
  #container {
    position: absolute;
    top: 50%;
    left: 50%;
    -webkit-transform: translate(-50%, -50%);
    transform: translate(-50%, -50%);
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  #date {
    font-weight: bold;
    line-height: 1.2;
    white-space: nowrap;
    text-align: center;
    margin: 0 auto;
    display: block;
    width: 100%;
    font-size: 80px; 
  }

  #clock {
    font-weight: 900;
    line-height: 1;
    white-space: nowrap;
    text-align: center;
    display: block;
    width: 100%;
    font-size: 150px;
  }

  #timezone-indicator {
    font-size: 18px;
    color: #666666;
    margin-top: 15px;
    font-weight: normal;
    text-align: center;
  }
  
  .flash-active {
    opacity: 0.4;
    transition: opacity 0.1s;
  }
</style>
</head>
<body>

<div id="container">
  <div id="date">YYYY-MM-DD</div>
  <div id="clock">00:00</div>
  <div id="timezone-indicator">UTC+0 (点击屏幕 +1 小时)</div>
</div>

<script>
var STORAGE_KEY = 'kindle_clock_offset';
var offset = 0;

function init() {
  var saved = localStorage.getItem(STORAGE_KEY);
  if (saved !== null) {
    offset = parseInt(saved, 10);
  }
  // 初始化时立即刷新一次
  refreshDisplay();
  // 启动定时器，每秒检查是否需要更新（处理分钟变化）
  setInterval(tick, 1000);
}

// 【核心函数】获取基于当前真实时间和最新偏移量的日期对象
function getCalculatedDate(currentOffset) {
  // 1. 获取当前的真实系统时间 (Now)
  var now = new Date();
  
  // 2. 转换为 UTC 时间戳 (毫秒)
  // getTimezoneOffset() 返回的是本地时间与 UTC 的差值 (分钟)，需转为毫秒并反向加减
  var utcTime = now.getTime() + (now.getTimezoneOffset() * 60000);
  
  // 3. 加上用户设定的时区偏移量 (小时 -> 毫秒)
  var adjustedTime = utcTime + (currentOffset * 3600000);
  
  // 4. 返回新的日期对象
  return new Date(adjustedTime);
}

// 刷新显示内容
function refreshDisplay() {
  // 每次调用都重新计算当前时间 + 当前偏移量
  var dateObj = getCalculatedDate(offset);
  
  // --- 格式化日期 yyyy-MM-dd ---
  var y = dateObj.getFullYear();
  var m = dateObj.getMonth() + 1;
  var d = dateObj.getDate();
  if (m < 10) m = "0" + m;
  if (d < 10) d = "0" + d;
  var dateStr = y + "-" + m + "-" + d;
  
  // --- 格式化时间 HH:mm ---
  var h = dateObj.getHours();
  var min = dateObj.getMinutes();
  if (h < 10) h = "0" + h;
  if (min < 10) min = "0" + min;
  var timeStr = h + ":" + min;
  
  // --- 格式化时区提示 ---
  var tzStr = "UTC" + (offset >= 0 ? "+" : "") + offset;
  
  // --- 更新 DOM ---
  var dateEl = document.getElementById("date");
  var clockEl = document.getElementById("clock");
  var tzEl = document.getElementById("timezone-indicator");
  
  // 强制更新内容，确保 Kindle 重绘
  dateEl.innerHTML = dateStr;
  clockEl.innerHTML = timeStr;
  tzEl.innerHTML = tzStr + " (点击屏幕 +1 小时)";
  
  // 调整字体大小
  adjustFontSizes();
}

// 定时器逻辑：只有分钟变了才调用刷新，减少不必要的重绘
var lastMinute = -1;
function tick() {
  // 这里也使用同样的逻辑计算当前分钟，判断是否变化
  var dateObj = getCalculatedDate(offset);
  if (dateObj.getMinutes() !== lastMinute) {
    lastMinute = dateObj.getMinutes();
    refreshDisplay();
  }
}

function adjustFontSizes() {
  var w = window.innerWidth || document.body.clientWidth;
  var h = window.innerHeight || document.body.clientHeight;
  
  var clockSize = Math.floor(w * 0.95);
  if (clockSize > h * 0.45) clockSize = Math.floor(h * 0.45);
  if (clockSize < 40) clockSize = 40;
  if (clockSize > 300) clockSize = 300;
  document.getElementById("clock").style.fontSize = clockSize + "px";
  
  var dateSize = Math.floor(w * 0.85);
  if (dateSize > h * 0.15) dateSize = Math.floor(h * 0.15);
  if (dateSize < 20) dateSize = 20;
  if (dateSize > 150) dateSize = 150;
  document.getElementById("date").style.fontSize = dateSize + "px";
}

// 【关键修改】点击处理逻辑
function handleTap() {
  // 1. 先增加偏移量
  offset += 1;
  
  // 2. 保存到本地存储
  localStorage.setItem(STORAGE_KEY, offset.toString());
  
  // 3. 【重要】立即重新获取当前真实时间 + 新偏移量，并刷新显示
  // 不再依赖旧的时间对象，而是完全重新计算
  refreshDisplay();
  
  // 4. 视觉反馈
  var container = document.getElementById("container");
  container.classList.add("flash-active");
  setTimeout(function() {
    container.classList.remove("flash-active");
  }, 150);
}

document.body.addEventListener('click', handleTap);
document.body.addEventListener('touchstart', function(e) {
  handleTap();
}, false);

window.onresize = adjustFontSizes;

init();
</script>

</body>
</html>
