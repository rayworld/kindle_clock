<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Kindle Clock</title>
<style>
  body {
    background-color: #ffffff;
    color: #000000;
    margin: 0;
    padding: 0;
    text-align: center;
    font-family: sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
  }
  
  #container {
    position: absolute;
    top: 50%;
    left: 50%;
    -webkit-transform: translate(-50%, -50%);
    transform: translate(-50%, -50%);
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  #date {
    font-weight: bold;
    line-height: 1.2;
    white-space: nowrap;
    text-align: center;
    margin: 0 auto;
    display: block;
    width: 100%;
    font-size: 80px; 
  }

  #clock {
    font-weight: 900;
    line-height: 1;
    white-space: nowrap;
    text-align: center;
    display: block;
    width: 100%;
    font-size: 150px;
  }

  #timezone-indicator {
    font-size: 18px;
    color: #666666;
    margin-top: 15px;
    font-weight: normal;
    text-align: center;
  }
  
  .flash-active {
    opacity: 0.4;
    transition: opacity 0.1s;
  }
</style>
</head>
<body>

<div id="container">
  <div id="date">YYYY-MM-DD</div>
  <div id="clock">00:00</div>
  <div id="timezone-indicator">UTC+0 (点击屏幕 +1 小时)</div>
</div>

<script>
var STORAGE_KEY = 'kindle_clock_offset';
var offset = 0;

function init() {
  var saved = localStorage.getItem(STORAGE_KEY);
  if (saved !== null) {
    offset = parseInt(saved, 10);
  }
  // 初始化时强制完整刷新一次
  updateDisplay(true);
  setInterval(tick, 1000);
}

// 核心：获取基于用户偏移量后的时间对象
function getAdjustedDate() {
  var now = new Date();
  // 1. 获取当前 UTC 毫秒数
  var utc = now.getTime() + (now.getTimezoneOffset() * 60000);
  // 2. 加上用户设定的偏移量 (小时 * 3600000)
  return new Date(utc + (3600000 * offset));
}

// 更新显示内容
// forceRefresh: 是否强制重写 DOM (用于切换时区时触发墨水屏刷新)
function updateDisplay(forceRefresh) {
  var dateObj = getAdjustedDate();
  
  // --- 计算日期 yyyy-MM-dd ---
  var y = dateObj.getFullYear();
  var m = dateObj.getMonth() + 1;
  var d = dateObj.getDate();
  if (m < 10) m = "0" + m;
  if (d < 10) d = "0" + d;
  var dateStr = y + "-" + m + "-" + d;
  
  // --- 计算时间 HH:mm ---
  var h = dateObj.getHours();
  var min = dateObj.getMinutes();
  if (h < 10) h = "0" + h;
  if (min < 10) min = "0" + min;
  var timeStr = h + ":" + min;
  
  // --- 时区提示 ---
  var tzStr = "UTC" + (offset >= 0 ? "+" : "") + offset;
  
  var dateEl = document.getElementById("date");
  var clockEl = document.getElementById("clock");
  var tzEl = document.getElementById("timezone-indicator");
  
  // 如果强制刷新，或者内容确实变了，才更新 DOM
  // 切换时区时，forceRefresh 为 true，会强制重写，触发 Kindle 重绘
  if (forceRefresh || dateEl.innerHTML !== dateStr) {
    dateEl.innerHTML = dateStr;
  }
  
  if (forceRefresh || clockEl.innerHTML !== timeStr) {
    clockEl.innerHTML = timeStr;
  }
  
  // 时区文字通常只在切换时变
  if (forceRefresh || tzEl.innerHTML.indexOf(tzStr) === -1) {
    tzEl.innerHTML = tzStr + " (点击屏幕 +1 小时)";
  }
  
  // 每次更新都重新计算字体，确保布局正常
  adjustFontSizes();
}

// 定时器：每分钟检查一次
var lastMinute = -1;
function tick() {
  var dateObj = getAdjustedDate();
  if (dateObj.getMinutes() !== lastMinute) {
    lastMinute = dateObj.getMinutes();
    updateDisplay(false); // 正常更新，不强制重绘
  }
}

function adjustFontSizes() {
  var w = window.innerWidth || document.body.clientWidth;
  var h = window.innerHeight || document.body.clientHeight;
  
  var clockSize = Math.floor(w * 0.95);
  if (clockSize > h * 0.45) clockSize = Math.floor(h * 0.45);
  if (clockSize < 40) clockSize = 40;
  if (clockSize > 300) clockSize = 300;
  document.getElementById("clock").style.fontSize = clockSize + "px";
  
  var dateSize = Math.floor(w * 0.85);
  if (dateSize > h * 0.15) dateSize = Math.floor(h * 0.15);
  if (dateSize < 20) dateSize = 20;
  if (dateSize > 150) dateSize = 150;
  document.getElementById("date").style.fontSize = dateSize + "px";
}

// 点击处理：切换时区
function handleTap() {
  offset += 1;
  
  // 保存设置
  localStorage.setItem(STORAGE_KEY, offset.toString());
  
  // 【关键】强制更新显示，确保日期和时间立即根据新时区重算并重绘
  updateDisplay(true);
  
  // 闪动反馈
  var container = document.getElementById("container");
  container.classList.add("flash-active");
  setTimeout(function() {
    container.classList.remove("flash-active");
  }, 150);
}

document.body.addEventListener('click', handleTap);
document.body.addEventListener('touchstart', function(e) {
  handleTap();
}, false);

window.onresize = adjustFontSizes;

init();
</script>

</body>
</html>
