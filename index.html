<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Kindle Clock</title>
<style>
  body {
    background-color: #FFFFFF;
    color: #000000;
    margin: 0;
    padding: 0;
    text-align: center;
    font-family: sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
  }

  #container {
    position: absolute;
    top: 50%;
    left: 50%;
    -webkit-transform: translate(-50%, -50%);
    transform: translate(-50%, -50%);
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 15px;
  }

  #analog-clock {
    position: relative;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background-color: #FFFFFF;
    border: 8px solid #000000;
    box-sizing: border-box;
    margin: 0 auto;
    /* 关键：创建新的层叠上下文，确保内部元素正常显示 */
    z-index: 1; 
  }

  .center-dot {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 14px;
    height: 14px;
    background-color: #000000;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    z-index: 30;
  }

  .hour-mark {
    position: absolute;
    top: 0;
    left: 50%;
    width: 6px;
    height: 20px;
    background-color: #000000;
    transform-origin: 50% 150px;
    transform: translateX(-50%) rotate(0deg);
    z-index: 1;
  }

  /* 数字样式强化 */
  .clock-number {
    position: absolute;
    top: 50%;
    left: 50%;
    /* 初始居中，JS 会偏移 */
    transform: translate(-50%, -50%); 
    font-weight: 900;
    color: #000000 !important; /* 强制黑色 */
    opacity: 1 !important;      /* 强制不透明 */
    -webkit-font-smoothing: none; 
    text-rendering: optimizeSpeed;
    /* 关键：确保数字在刻度之上，指针之下或之上均可，这里设为 10 */
    z-index: 10; 
    line-height: 1;
  }

  .hour-number { font-size: 24px; }
  .minute-number { font-size: 14px; color: #000000 !important; font-weight: bold; }

  .hand {
    position: absolute;
    bottom: 50%;
    left: 50%;
    background-color: #000000;
    transform-origin: bottom center;
    z-index: 20; /* 指针在数字之上 */
    border-top-left-radius: 4px;
    border-top-right-radius: 4px;
  }

  #hour-hand { width: 10px; height: 25%; }
  #minute-hand { width: 7px; height: 38%; }

  #digital-clock {
    font-weight: 900;
    font-size: 60px;
    line-height: 1;
    white-space: nowrap;
    margin-top: 5px;
  }

  #date {
    font-weight: bold;
    font-size: 30px;
    white-space: nowrap;
    margin-top: 5px;
  }

  #timezone-indicator {
    font-size: 16px;
    color: #555555;
    margin-top: 5px;
  }

  .flash-active { opacity: 0.5; }
</style>
</head>
<body>

<div id="container">
  <div id="analog-clock">
    <div class="center-dot"></div>
    <div id="hour-hand" class="hand"></div>
    <div id="minute-hand" class="hand"></div>
    <!-- 数字将由 JS 插入到这里 -->
  </div>
  <div id="digital-clock">--:--</div>
  <div id="date">---- -- --</div>
  <div id="timezone-indicator">UTC+0 (点击屏幕 +1 小时)</div>
</div>

<script>
var STORAGE_KEY = 'kindle_clock_offset';
var offset = 0;
var analogClockEl = document.getElementById('analog-clock');
var hourHand = document.getElementById('hour-hand');
var minuteHand = document.getElementById('minute-hand');
var lastMin = -1;

function init() {
  var saved = localStorage.getItem(STORAGE_KEY);
  if (saved !== null) {
    offset = parseInt(saved, 10);
  }
  
  // 1. 生成刻度和数字
  createMarkersAndNumbers();
  
  // 2. 立即刷新一次
  refreshDisplay();
  
  // 3. 【关键】延迟 200ms 再次刷新数字位置，确保 Kindle 已完成布局
  setTimeout(function() {
    createMarkersAndNumbers(); // 重新生成以确保位置计算基于正确的尺寸
    refreshDisplay();
  }, 200);

  // 4. 启动定时器
  scheduleNextTick();
}

function scheduleNextTick() {
  setTimeout(function() {
    checkAndUpdate();
    scheduleNextTick();
  }, 1000);
}

function checkAndUpdate() {
  var dateObj = getCalculatedDate(offset);
  var currentMin = dateObj.getMinutes();
  
  if (currentMin !== lastMin) {
    lastMin = currentMin;
    refreshDisplay();
  }
}

function getCalculatedDate(currentOffset) {
  var now = new Date();
  var utc = now.getTime() + (now.getTimezoneOffset() * 60000);
  return new Date(utc + (currentOffset * 3600000));
}

function refreshDisplay() {
  var dateObj = getCalculatedDate(offset);
  var h = dateObj.getHours();
  var m = dateObj.getMinutes();
  
  var hStr = (h < 10 ? '0' : '') + h;
  var mStr = (m < 10 ? '0' : '') + m;
  document.getElementById('digital-clock').innerHTML = hStr + ':' + mStr;
  
  var y = dateObj.getFullYear();
  var mo = dateObj.getMonth() + 1;
  var d = dateObj.getDate();
  var moStr = (mo < 10 ? '0' : '') + mo;
  var dStr = (d < 10 ? '0' : '') + d;
  document.getElementById('date').innerHTML = y + '-' + moStr + '-' + dStr;
  
  var tzStr = 'UTC' + (offset >= 0 ? '+' : '') + offset;
  document.getElementById('timezone-indicator').innerHTML = tzStr + ' (点击屏幕 +1 小时)';
  
  updateHands(h, m);
}

function updateHands(h, m) {
  h = h % 12;
  var mAngle = m * 6;
  var hAngle = (h * 30) + (m * 0.5);
  
  hourHand.style.transform = 'translateX(-50%) rotate(' + hAngle + 'deg)';
  minuteHand.style.transform = 'translateX(-50%) rotate(' + mAngle + 'deg)';
  
  // 强制重绘
  analogClockEl.style.opacity = '0.99';
  setTimeout(function(){ analogClockEl.style.opacity = '1'; }, 50);
}

function createMarkersAndNumbers() {
  // 清空旧元素
  var existing = analogClockEl.querySelectorAll('.hour-mark, .clock-number');
  for(var i=0; i<existing.length; i++) existing[i].remove();

  var radius = analogClockEl.offsetWidth / 2;
  if (radius === 0) radius = 150; // 防错默认值
  
  // 1. 创建刻度
  for (var i = 0; i < 12; i++) {
    var mark = document.createElement('div');
    mark.className = 'hour-mark';
    mark.style.transformOrigin = '50% ' + radius + 'px';
    mark.style.transform = 'translateX(-50%) rotate(' + (i * 30) + 'deg)';
    analogClockEl.appendChild(mark);
  }

  // 2. 创建小时数字 (1-12)
  var hRad = radius * 0.65;
  for (var h = 1; h <= 12; h++) {
    var el = document.createElement('div');
    el.className = 'clock-number hour-number';
    el.innerText = h; // 使用 innerText 兼容性更好
    
    // 计算坐标
    var angle = (h * 30 - 90) * (Math.PI / 180);
    var x = Math.cos(angle) * hRad;
    var y = Math.sin(angle) * hRad;
    
    // 强制设置样式
    el.style.left = '50%';
    el.style.top = '50%';
    el.style.transform = 'translate(-50%, -50%) translate(' + Math.round(x) + 'px, ' + Math.round(y) + 'px)';
    el.style.zIndex = '10';
    el.style.color = '#000000';
    
    analogClockEl.appendChild(el);
  }

  // 3. 创建分钟数字 (00, 05... 55)
  var mRad = radius * 0.45;
  for (var m = 0; m < 60; m += 5) {
    var el = document.createElement('div');
    el.className = 'clock-number minute-number';
    el.innerText = (m < 10 ? '0' : '') + m;
    
    var angle = (m * 6 - 90) * (Math.PI / 180);
    var x = Math.cos(angle) * mRad;
    var y = Math.sin(angle) * mRad;
    
    el.style.left = '50%';
    el.style.top = '50%';
    el.style.transform = 'translate(-50%, -50%) translate(' + Math.round(x) + 'px, ' + Math.round(y) + 'px)';
    el.style.zIndex = '10';
    el.style.color = '#000000';
    
    analogClockEl.appendChild(el);
  }
}

function handleTap() {
  offset += 1;
  localStorage.setItem(STORAGE_KEY, offset.toString());
  lastMin = -1;
  refreshDisplay();
  
  var container = document.getElementById('container');
  container.className = 'flash-active';
  setTimeout(function(){ container.className = ''; }, 150);
}

document.body.addEventListener('click', handleTap);
document.body.addEventListener('touchstart', function(e){ handleTap(); }, false);

init();
</script>

</body>
</html>
