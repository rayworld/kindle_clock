<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kindle High Contrast Clock</title>
    <style>
        /* 全局重置，确保最高对比度 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #FFFFFF !important; /* 强制纯白背景 */
            color: #000000 !important; /* 强制纯黑文字 */
            overflow: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            /* 关键：禁用所有字体平滑，让电子墨水屏显示锐利的黑白像素 */
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: grayscale;
            font-smooth: never;
            text-rendering: optimizeSpeed; /* 优化速度而非美观，减少模糊 */
        }

        #clock {
            /* 使用最粗的字体 */
            font-weight: 900; 
            /* 字体家族：优先使用系统自带的粗黑体 */
            font-family: "Arial Black", "Impact", "Helvetica Neue", Helvetica, Arial, sans-serif;
            white-space: nowrap;
            line-height: 1;
            letter-spacing: -2px; /* 稍微收紧字间距，让数字更紧凑 */
            
            /* 确保没有任何阴影或效果 */
            text-shadow: none;
            color: #000000;
            
            /* 初始大小，JS 会覆盖 */
            font-size: 20vw;
        }
    </style>
</head>
<body>
    <div id="clock"></div>

    <script>
        const clockElement = document.getElementById('clock');

        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const timeString = `${hours}:${minutes}`;
            
            if (clockElement.textContent !== timeString) {
                clockElement.textContent = timeString;
            }
        }

        function adjustFontSize() {
            const width = window.innerWidth;
            const maxWidth = width * 0.98; // 尽量占满，只留 1% 边距
            
            let size = 50; // 从 50px 开始测试
            clockElement.style.fontSize = size + 'px';
            
            // 逐步增加字体直到接近屏幕宽度
            while (clockElement.offsetWidth < maxWidth && size < 1000) {
                size += 5;
                clockElement.style.fontSize = size + 'px';
            }
            
            // 如果最后一次增加导致超出，稍微回退一点（可选，通常直接保留最大值即可）
            if (clockElement.offsetWidth > maxWidth) {
                clockElement.style.fontSize = (size - 5) + 'px';
            }
        }

        function keepAlive() {
            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen').catch(() => {});
            }
        }

        // 初始化
        updateClock();
        adjustFontSize();
        keepAlive();

        // 每分钟更新
        setInterval(updateClock, 60000);

        // 窗口变化或点击时重新计算大小
        window.addEventListener('resize', adjustFontSize);
        document.addEventListener('click', () => {
            adjustFontSize();
            // 强制重绘，有时有助于清除墨水屏残影
            document.body.style.display = 'none';
            setTimeout(() => { document.body.style.display = 'flex'; }, 50);
        });
    </script>
</body>
</html>
